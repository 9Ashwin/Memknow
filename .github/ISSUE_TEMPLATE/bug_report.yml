name: 🐛 Bug Report
description: Report a bug or issue
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the information below to help us locate and fix the issue quickly.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Select the component where the issue occurs
      options:
        - Feishu Integration (WS / Card)
        - Claude CLI Executor
        - Session Management
        - Heartbeat
        - Schedule
        - Workspace / Template
        - Web Search
        - Configuration
        - Database (SQLite)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the issue
      placeholder: "Describe what the bug looks like..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps that reliably reproduce the problem
      placeholder: |
        1. Send message '...' in Feishu
        2. Bot responds with '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen
      placeholder: "What should have happened..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happened (error messages, screenshots, etc.)
      placeholder: "What actually happened..."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Memknow Version
      description: |
        Please provide the version or commit SHA you are running.
        If you built from source, include the commit SHA.
      placeholder: "e.g., v0.1.0 or commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running Memknow?
      options:
        - Build from source (go run / go build)
        - Daemon (daemon-mac / daemon-linux)
        - Binary release
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: The operating system you are using
      placeholder: "e.g., macOS 15.0, Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant logs or error messages here (check server.log)
      placeholder: "Paste logs or error messages..."
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      description: Please confirm the following
      options:
        - label: I have searched existing issues and confirmed this is a new one
          required: true
